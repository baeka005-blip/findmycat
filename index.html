<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Find My Cat</title>
<style>
body{
    margin:0;
    height:100vh;
    background:linear-gradient(to bottom, #000000 0%, #101010 60%, #202020 100%);
    color:white;
    font-family:Arial, sans-serif;
    overflow:hidden;
    cursor:default;
}

.intro{
    position:absolute;
    top:25px;
    width:100%;
    text-align:center;
    font-size:22px;
    z-index:10;
}

.room{
    position:relative;
    width:100%;
    height:100%;
}


.object{
    position:absolute;
    font-size:22px;
    opacity:0;
    transition:opacity .15s;
}


.cat{
    font-size:28px;
}


.bubble{
    position:absolute;
    bottom:38px;
    left:-8px;
    background:white;
    color:black;
    padding:4px 9px;
    border-radius:10px;
    font-size:14px;
    opacity:0;
    pointer-events:none;
}

.cat:hover .bubble{
    opacity:1;
}

.flashlight-cursor{
    position:fixed;
    width:400px;
    height:400px;
    border-radius:50%;
    pointer-events:none;
    background:radial-gradient(circle, rgba(255,255,210,0.95) 0%, rgba(255,255,210,0.55) 30%, rgba(0,0,0,0.95) 70%);
    mix-blend-mode:screen;
    z-index:15;
}

.flashlight-icon{
    position:absolute;
    left:30px;            
    top:50%;
    transform:translateY(-50%);
    width:70px;           
    height:70px;
    font-size:60px;       
    text-align:center;
    line-height:70px;
    cursor:pointer;
    z-index:20;
    transition: transform 0.2s ease, text-shadow 0.2s ease;
}


.flashlight-icon:hover{
    transform:translateY(-50%) scale(1.2); 
    text-shadow: 0 0 15px yellow, 0 0 30px rgba(255,255,210,0.6);
}


.dust{
    position:absolute;
    font-size:14px;
    color:rgba(255,255,255,0.5);
    pointer-events:none;
    animation:float 5s linear infinite;
}

@keyframes float{
    0% { transform: translateY(0px) translateX(0px);}
    50% { transform: translateY(-10px) translateX(5px);}
    100% { transform: translateY(0px) translateX(0px);}
}
</style>
</head>
<body>

<div class="intro">
My cat ran under the bed again…<br>
help me look for him
</div>

<div class="room">

<div class="object" style="top:10%; left:15%;">🧦</div>
<div class="object" style="top:15%; left:50%;">🧸</div>
<div class="object" style="top:8%; left:75%;">🧵</div>
<div class="object" style="top:20%; left:30%;">🧾</div>
<div class="object" style="top:12%; left:85%;">•</div>
<div class="object" style="top:25%; left:60%;">📚</div>
<div class="object" style="top:18%; left:40%;">🪀</div>
<div class="object" style="top:22%; left:70%;">🍕</div>

<div class="object" style="top:35%; left:10%;">🧦</div>
<div class="object" style="top:40%; left:25%;">🧸</div>
<div class="object" style="top:38%; left:50%;">🪣</div>
<div class="object" style="top:36%; left:65%;">🧾</div>
<div class="object" style="top:45%; left:80%;">•</div>

<div class="object" style="top:55%; left:15%;">🪞</div>
<div class="object" style="top:60%; left:40%;">🧵</div>
<div class="object" style="top:58%; left:70%;">🪀</div>
<div class="object" style="top:62%; left:55%;">🧦</div>
<div class="object" style="top:65%; left:85%;">🍕</div>

<div class="object" style="top:75%; left:20%;">🧸</div>
<div class="object" style="top:78%; left:35%;">🧾</div>
<div class="object" style="top:72%; left:50%;">🐾</div>
<div class="object" style="top:77%; left:65%;">🐾</div>
<div class="object" style="top:80%; left:40%;">•</div>

<!-- cat -->
<div class="object cat" style="top:82%; left:60%;">
🐈
<div class="bubble">meow!</div>
</div>


<div class="flashlight-icon" id="flash">🔦</div>

</div>


<div class="flashlight-cursor" id="light" style="display:none;"></div>

<script>
const light = document.getElementById("light");
const objects = document.querySelectorAll(".object");
const flash = document.getElementById("flash");

let holdingFlashlight = false;

flash.addEventListener("click", ()=>{
    holdingFlashlight = true;
    flash.style.display="none";
    light.style.display="block"; 
    document.body.style.cursor="none";
});

document.addEventListener("mousemove", (e)=>{
    if(!holdingFlashlight) return;
    const x = e.clientX;
    const y = e.clientY;

    light.style.left = (x-200) + "px";
    light.style.top = (y-200) + "px";

    objects.forEach(obj=>{
        const rect = obj.getBoundingClientRect();
        const objX = rect.left + rect.width/2;
        const objY = rect.top + rect.height/2;
        const distance = Math.hypot(x-objX, y-objY);
        if(distance < 200){   
            obj.style.opacity = 1;
        } else{
            obj.style.opacity = 0;
        }
    });
});


for(let i=0;i<50;i++){
    const d = document.createElement("div");
    d.className="dust";
    d.textContent="•";
    d.style.top = Math.random()*100 + "%";
    d.style.left = Math.random()*100 + "%";
    d.style.animationDuration = 3+Math.random()*5+"s";
    document.body.appendChild(d);
}
</script>

</body>
</html>
